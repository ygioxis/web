<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lista tarefas 2 bim </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f5f5;
        }

        .alta{
            background-color: #c8dfc8;
            border: 2px solid #88b188;
        }

        .media{
            background-color: #efe3b0;
            border: 2px solid #cdbb73;
        }

        .baixa{
            background-color: #e7b8b8;
            border: 2px solid #c97b7b;
        }

    </style>
</head>

<body>

    <header class="bg-secondary text-white text-center p-4 mb-4">
        <h1>Minha Lista de Tarefas</h1>
    </header>

    <main class="container">

        <div class="d-flex gap-2 mb-4">

            <input
                type="text"
                id="tarefa"
                class="form-control"
                placeholder="Digite uma tarefa"
            >

            <select id="prioridade" class="form-select w-25">

                <option hidden selected>Prioridade</option>

                <option>Alta</option>
                <option>Média</option>
                <option>Baixa</option>

            </select>

            <button onclick="adicionar()" class="btn btn-dark">
                Adicionar
            </button>

        </div>

        <div id="lista" class="d-flex flex-wrap gap-3"></div>

    </main>

    <script>

        function adicionar(){

            let tarefa = document.getElementById("tarefa").value;
            let prioridade = document.getElementById("prioridade").value;

            if(prioridade == "Prioridade" || prioridade == ""){

                alert("Escolha uma prioridade!");

                return;

            }

            let card = document.createElement("div");

            card.className = "p-3 rounded shadow-sm";

            let texto = document.createElement("p");

            texto.innerText =
            "Tarefa: " + tarefa +
            " | Prioridade: " + prioridade;

            if(prioridade == "Alta"){

                card.classList.add("alta");

            }

            else if(prioridade == "Média"){

                card.classList.add("media");

            }

            else{

                card.classList.add("baixa");

            }

            card.appendChild(texto);

            document.getElementById("lista").appendChild(card);

            document.getElementById("tarefa").value = "";
            document.getElementById("prioridade").selectedIndex = 0;

        }

    </script>

</body>
</html>
